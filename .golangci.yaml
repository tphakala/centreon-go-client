version: "2"
output:
  sort-order:
    - linter
    - severity
    - file
linters:
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - decorder
    - dupl
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forcetypeassert
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - iface
    - ineffassign
    - makezero
    - misspell
    - mnd
    #- modernize  # disabled - using ruleguard for Go 1.24+/1.25+/1.26+ modernization instead
    - musttag
    - nakedret
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    #- nolintlint
    - prealloc
    - predeclared
    - recvcheck
    - revive
    - gosec
    - sloglint
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
  disable:
    - unused
  settings:
    dupl:
      threshold: 120
    gocognit:
      min-complexity: 20
    gocritic:
      disabled-checks:
        - commentFormatting
        - commentedOutCode
      enabled-tags:
        - style
        - diagnostic
        - performance
      settings:
        ruleguard:
          rules: "rules/*.go"
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: unused-parameter
          disabled: true
    gosec:
      excludes:
        - G104  # Audit errors not checked (covered by errcheck)
      severity: medium
      confidence: medium
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    rules:
      - linters:
          - dupl
        path: "(host_groups|host_categories|host_severities|host_templates|service_groups|service_categories|service_severities|service_templates|_test)\\.go"
      - linters:
          - goconst
        path: "_test\\.go"
      - linters:
          - gocritic
        path: "example_test\\.go"
        text: "ruleguard"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false
